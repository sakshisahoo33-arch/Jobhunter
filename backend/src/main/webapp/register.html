<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Register</h1>

<form id="register-form">
    <label>Full Name</label><br>
    <input type="text" name="full_name" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" required><br><br>

    <label>Password</label><br>
    <input type="password" name="password" required><br><br>

    <label>Phone</label><br>
    <input type="text" name="phone"><br><br>

    <button type="submit">Register</button>
</form>

<div id="message"></div>

<br>
<a href="login.html">Already have an account? Login</a>

<script>
const form = document.getElementById('register-form');
const message = document.getElementById('message');
form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const formData = new FormData(form);
    const body = new URLSearchParams(formData);
    const payload = {};
    formData.forEach((value, key) => payload[key] = value);
    console.log('Register payload:', payload);
    try {
        const response = await fetch('register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
            },
            body: body.toString()
        });
        const result = await response.json();
        console.log('Register response status:', response.status, 'body:', result);
        if (response.ok) {
            message.textContent = result.message || 'Registration successful. Redirecting to login...';
            setTimeout(() => window.location.href = 'login.html', 1200);
        } else {
            const errorText = result.message || result.error || 'Registration failed.';
            message.textContent = `Error ${response.status}: ${errorText}`;
        }
    } catch (error) {
        console.error('Register fetch failed:', error);
        message.textContent = 'Registration failed due to a network or server error. See console for details.';
    }
});
</script>

</body>
</html>
